- abstract: This paper presents our systems for two tasks at \#SMM4H-HeaRD 2026. For
    Task 1 (multilingual Adverse Drug Event detection), we fine-tune BERT-based multilingual
    models (InfoXLM and XLM-RoBERTa) and Qwen3.5-9B with ensemble methods, achieving
    0.8584 macro F1 on the development set and 0.5304 F1 on unseen Farsi. For Task
    7 (span detection of ClinicalImpacts and SocialImpacts in opioid narratives),
    DeBERTa-Large with simplified labeling achieves the best test performance (0.583
    relaxed F1, 0.500 strict F1). Our analysis shows that LLMs excel on known languages
    in Task 1, while transformer-based models with simplified labeling generalize
    better for NER tasks.
