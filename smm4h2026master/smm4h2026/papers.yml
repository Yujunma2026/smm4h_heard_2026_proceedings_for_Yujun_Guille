- abstract: 'This paper presents our submission to the MultiClinAI Shared Task (Gallego-Donoso
    et al., 2026) on cross-lingual clinical entity annotation projection from Spanish
    to English. Our system transfers expert annotations for $\textit{Diseases}$, $\textit{Symptoms}$
    and $\textit{Procedures}$ entities. The approach integrates three core components:
    adaptive candidate window generation, an XGBoost classifier leveraging surface
    and semantic features, and an LLM-based post-processing stage to resolve complex
    misalignments. Our highest-performing run ranked 3rd on the official leaderboard,
    achieving strict F1 scores of 0.737, 0.549, and 0.538 for $\textit{Diseases}$,
    $\textit{Symptoms}$ and $\textit{Procedures}$, respectively. These results show
    that combining supervised candidate scoring with targeted LLM refinement provides
    a robust strategy for clinical entity projection.'
