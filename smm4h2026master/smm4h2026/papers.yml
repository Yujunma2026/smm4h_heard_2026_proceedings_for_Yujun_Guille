- abstract: The   Tumor,   Node,   and   Metastasis   (TNM)   staging   system   is   critical   to   cancer   treatment.   This
    study   aims   to   predict   TNM   stage   labels   independently,   with   the   Cancer   Genome   Atlas
    (TCGA)   pathology   report   as   the   sixth   shared   task   of   SMM4H-HeaRD   2026.   The   problem   is
    framed   as   three   multi-label   classification   tasks.   We   explore   both   classical   and   deep   learning
    approaches   using   Term   Frequency-Inverse   Document   Frequency   (TF-IDF)   features   and
    embeddings from ClinicalBERT,   BioBERT,   and   PubMedBERT.   These   representations   are   used
    with   Logistic   Regression   (LR),   Light   Gradient   Boosting   Machine   (LightGBM),   Feed-Forward
    Neural   Networks   (FFNN),   and   Wide   Residual   Networks   (WRN).   Our   results   show   that
    individual   embeddings   perform   similarly   to   the   TNM   label   classification,   while   their
    combination   improves   its   predictive   ability.   WRN   achieves   AUROC   scores   of   0.839   (T),   0.8502
    (N),   and   0.803   (M)   with   F1-scores   of   0.622,   0.702,   and   0.9337,   respectively,   for   the   training
    phase.   LightGBM   with   TF-IDF   performs   best   with   AUROC   scores   of   0.9368   (T),   0.9524   (N),
    and   0.8311   (M)   and   F1-scores   of   0.7559   (T),   0.7384   (N),   and   0.7017   (M)   during   the   training
    phase.  Furthermore,   the   result   of   the   Codabench   for   the   test   sets   indicates   a   Macro-F1   score
    of   0.978,   0.957,   and   0.879   for   the   T,   N,   and   M   categories   respectively   for   test   set   1;   while
    test   set   2   records   a   Macro-F1   score   for   T,   N,   and   M   is   0.807,   0.767,   1.0   respectively.
    However,   performance   declined   during   the   evaluation   phase   of   the   test   sets,   a   drop   from
    0.938   for   test   set   1   to   0.858   for   test   set   2,   for   the   Macro-F1   score   across   all   stages;
    suggesting   limitations   in   model   generalizability,   sensitivity   to   class   imbalance,   and
    challenges   in   processing   lengthy   clinical   documents.   Although   this   study   provides   an
    efficient   baseline   model   and   a   reproducible   pipeline,   further   optimization   and   validation   are
    required   before   it   can   be   considered   suitable   for   use   in   a   real-world   clinical   setting.
