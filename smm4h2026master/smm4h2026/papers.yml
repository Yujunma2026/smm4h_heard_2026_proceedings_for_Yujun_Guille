- abstract: 'This paper presents our submission to MultiClinAI''s NER subtask for
    #SMM4H-HeaRD 2026. We focus on the questions 1) which Language Model represents
    the clinical notes best and 2) which annotations can help training these models.
    To get answers for these questions, we follow a token-based classification approach
    with pretrained encoder language models, where we compare models that were pretrained
    on generic data against medical data, and on a single language, Dutch, against
    many languages. In addition, we present two data-augmented systems: one with data
    from the other languages of the workshop for multilingual training, and one with
    synthetic annotations.'
