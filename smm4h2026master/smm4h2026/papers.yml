- abstract: We describe the setup we used to complete the MultiClinAI-NER task in
    the SMM4H-HeaRD workshop 2026. In this work we employed a dedicated multilingual
    encoder model (EuroBERT-610m), two Dutch encoder models trained from scratch on
    clinical corpora (MedRoBERTa.nl and CardioDeBERTa.nl) and a generic Dutch encoder
    model (RobBERT2023-large), all finetuned with a 3-layer DNN head. We find that
    the use of multilingual datasets is potentially beneficial in augmenting the training
    corpora of monolingual models.
