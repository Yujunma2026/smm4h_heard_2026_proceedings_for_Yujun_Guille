- abstract: 'In this work, we address the detection of drug abuse repercussions in
    Reddit posts, as part of SMM4H-HeaRD Task 7: Extraction of Social and Clinical
    Impacts of Substance Use from Social Media Posts. We evaluate multiple approaches,
    including fine-tuning and zero-shot inference, across several deep learning architectures.
    Our best result is obtained using an adapter-based fine-tuning approach on the
    DeBERTaV3 model. In addition, we explore text-based evolutionary optimization
    for Gemma 4 workflows and show that, on this task, they achieve competitive performance
    with the supervised DeBERTaV3 setup.'
