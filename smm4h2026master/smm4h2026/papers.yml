- abstract: "This paper presents our systems for the SMM4H 2026 shared task on flu-related\
    \ tweet\nclassification across two subtasks: flu vaccination status and flu test\
    \ outcome classification. \nFor each subtask, we evaluate two approaches: fine-tuning\
    \ BERTweet-large with a\ntemporal-aware architecture, cross-validation ensembling,\
    \ and regularization techniques, and\na GPT-4o few-shot prompting system with\
    \ similarity-based dynamic example retrieval,\nchain-of-thought reasoning and\
    \ contrastive label ranking. Fine-tuning proves superior for the\nflu vaccination\
    \ subtask (micro-F1: 87.90%), where sufficient and relatively balanced training\
    \ data\nis available, while few-shot prompting performs better for the flu test\
    \ subtask (micro-F1: 95.74%), \nwhere limited and heavily imbalanced training\
    \ data renders fine-tuning less effective."
