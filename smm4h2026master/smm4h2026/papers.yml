- abstract: 'We describe two system submissions to Task 4 of the SMM4H-HeaRD 2026
    Shared Task on automated SOAP note generation from doctor–patient dialogues. Our
    first submission is a standalone entity-conditioned generation model: Mistral-7B-Instruct-v0.1
    fine-tuned with QLoRA on 8,529 MedSynth training dialogues, where both training
    and inference prompts include clinical entities extracted and grouped by SOAP
    section. Our second submission is a four-stage modular pipeline that additionally
    incorporates a hybrid retrieval stage and a rule-based verification stage. The
    key finding of this work is that incorporating structured clinical domain knowledge,
    in the form of NER entities grouped by SOAP section, directly into the generation
    prompt produces consistent and reliable improvements over dialogue-only generation.
    Our four-stage pipeline submission achieved an average score of 0.54 on the official
    test set, ranking first on the shared task leaderboard.'
