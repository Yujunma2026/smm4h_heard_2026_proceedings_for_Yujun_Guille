- abstract: 'We describe our submission to Task 1 of \#SMM4H-HeaRD~2026: multilingual
    binary classification of adverse drug event (ADE) mentions in social media. Our
    system fine-tunes $\texttt{xlm-roberta-large}$ with LoRA adapters and learned
    language embeddings, using two-stage training (CADEC translated domain adaptation,
    then five-fold cross-validation on the official training set). We ensemble the
    five fold checkpoints by mean logits, apply temperature scaling on the development
    set, and tune decision thresholds to maximize the official metric. On development,
    the final ensemble reaches macro-F$_1$ 0.788 with a global threshold and 0.796
    with per-language thresholds; our best official test submission achieves macro-F$_1$
    0.616 (ID 678990).'
