- abstract: This paper describes the system submitted by our team to the MultiClinAI
    shared task at the 11th SMM4H-HeaRD Workshop (ACL 2026). The task addresses multilingual
    clinical Named Entity Recognition (NER) for three entity types (Disease, Procedure,
    and Symptom) in Spanish clinical texts. Our approach fine-tunes MrBERT-biomed,
    a domain-adapted ModernBERT model pre-trained on biomedical corpora, using multilingual
    clinical data from seven European languages. We train independent entity-specific
    models, each optimized via Bayesian hyperparameter search with Optuna, and apply
    a deterministic post-processing step that aligns predicted spans to word boundaries.
    On the official test set, our system achieves overall strict micro-F1 scores of
    0.7453, 0.7107, and 0.6603 for Disease, Procedure, and Symptom, respectively.
