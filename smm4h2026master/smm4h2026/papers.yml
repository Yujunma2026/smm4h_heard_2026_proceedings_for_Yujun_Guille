- abstract: Computational mental health research has predominantly centered on English-speaking
    populations, leaving Arabic-language discourse comparatively under-examined. We
    present an exploratory computational study of 8,147 tweets from 607 users classified
    by a GPT-4.1 personal-disclosure pipeline as likely lived-experience authors in
    three condition-specific Arabic-language X (formerly Twitter) Communities. We
    focus on discourse related to borderline personality disorder (BPD), bipolar disorder,
    and ADHD, and characterize community-associated linguistic patterns using a multi-domain
    cultural keyword framework. The results suggest that in this corpus, Bipolar tweets
    contain more religious and medical vocabulary, BPD tweets contain more relational,
    identity, and emotional-distress vocabulary, and ADHD tweets more often focus
    on practical symptoms and medication management. We treat these patterns as hypothesis-generating
    rather than confirmatory because the corpus is imbalanced across conditions, some
    subcorpora are temporally concentrated, and the keyword framework is an initial
    operationalization rather than a validated measurement instrument. The paper contributes
    a reusable LLM-assisted personal-disclosure pipeline and an exploratory cultural
    keyword framework for Arabic mental health discourse.
