- abstract: 'We present an overview of the MultiClinAI shared task, which focuses
    on multilingual clinical entity extraction and automatic corpus generation through
    annotation projection. It addresses two key challenges in clinical natural language
    processing (NLP): (i) developing comparable multilingual named entity recognition
    (NER) systems and (ii) automatically constructing multilingual clinical corpora
    through annotation projection. The MultiClinAI task provides a unified benchmark
    for evaluating multilingual and cross-lingual clinical NLP approaches that cover
    diseases, symptoms, and procedures in Spanish, English, Dutch, Italian, Romanian,
    Swedish, and Czech. A total of 21 teams from 13 countries participated, submitting
    531 runs across the different subtasks. The top runs obtained very competitive
    results, close to human expert annotation quality. The results highlight both
    the challenges and opportunities of multilingual clinical information extraction.
    All resources, including a corpus of over 738,201 manually revised entity mentions
    across seven languages, are publicly available on Zenodo at: \url{https://zenodo.org/records/19334278}.'
