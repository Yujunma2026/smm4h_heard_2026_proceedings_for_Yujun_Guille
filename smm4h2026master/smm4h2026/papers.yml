- abstract: 'We describe our submission to SMM4H-

    HeaRD 2026 Task 7, which asks systems to

    label ClinicalImpacts and SocialImpacts

    spans in Reddit posts about non-medical sub-

    stance use. We compare four pipeline shapes

    built on the same DeBERTa-v3-base back-

    bone: (i) a direct 5-class encoder with a linear-

    chain CRF head, (ii) a two-stage detect-then-

    classify pipeline that delegates span typing

    to an instruction-tuned LLM (Qwen2.5-7B

    or Gemma-3-12B, 4-bit NF4), (iii) an audit

    pipeline in which the same LLM verifies the

    encoder’s predictions, and (iv) a classical-ML

    variant that replaces the LLM with an SVM

    trained on encoder span embeddings. Across

    16 configurations, the encoder-only DeBERTa-

    v3 + CRF configuration is the strongest sin-

    gle system on the official test split, reaching

    45.4% strict and 54.2% relaxed F1 — +8.6

    / +5.3 points above a mental-roberta-base

    baseline. LLM audits give a small dev gain that

    does not transfer to test.'

