- abstract: "Identifying sentences in COVID-19 literature that report patient metadata\
    \ is an important step in genomic epidemiology, currently requiring costly manual\
    \ curation.\n  We compare fine-tuned encoder-only models (BERT, BioLinkBERT) and\
    \ autoregressive LLMs (Llama, Gemma, GPT-OSS) under prompting and fine-tuning\
    \ regimes, using Focal Loss and undersampling to address severe class imbalance.\n\
    \  Encoder-only models substantially outperform autoregressive models: BioLinkBERT-base\
    \ with Focal Loss achieves macro F1 of 0.76, versus 0.54 for the best fine-tuned\
    \ autoregressive model."
