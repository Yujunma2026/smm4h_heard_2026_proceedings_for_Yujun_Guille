- abstract: 'We describe team blue’s participation across six SMM4H-HeaRD 2026 shared
    tasks spanning multilingual adverse drug event detection (Task 1), influenza vaccine
    effectiveness estimation (Task 3), patient metadata classification (Task 5), TNM
    cancer staging (Task 6), opioid impact span detection (Task 7), and multilingual
    clinical NER with cross-lingual annotation projection (Task 8). Despite the heterogeneity
    of these tasks, binary, multi-class, multi-label, and sequence-labelling, our
    systems share three recurring design principles: (i) inverse-frequency class weighting
    to handle severe imbalance, (ii) multi-seed and/or multi-backbone ensembling to
    reduce variance, and (iii) post-hoc calibration of decision boundaries. Key results
    include micro-F1 of 0.990 on TNM staging (Task 6), 0.872/0.918 on flu vaccination/test
    classification surpassing the 70B CoT baseline on vaccination (Task 3), F1 of
    0.764 on patient metadata approaching the fine-tuning benchmark of 0.776 (Task
    5), and competitive performance on ADE detection (Task 1, F1 = 0.580), opioid
    spans (Task 7, relaxed F1 = 0.59), and multilingual clinical NER (Task 8, strict
    F1 0.20–0.41 across 7 languages).'
